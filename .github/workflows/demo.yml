name: Datacom GitHub Actions Demo

on:
  workflow_dispatch:

env:
  DAY_OF_WEEK: Monday

jobs:
  demo-job:
    runs-on: ubuntu-latest
    env:
      GREETING: Hello
    steps:
      - name: Print greeting using env variables
        run: echo "$GREETING Saad. Today is $DAY_OF_WEEK."

      - name: Use repository variable
        env:
          REPO_VAR: ${{ vars.DATACOM }}
        run: echo "Project Name: $REPO_VAR"
